services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    build:
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana}
        grafana_version: ${GRAFANA_VERSION:-12.3.0}
    environment:
      GF_LOG_FILTERS: plugin.ricoberger-incidentio-datasource:debug
      GF_LOG_LEVEL: error
      INCIDENTIO_API_KEY: ${INCIDENTIO_API_KEY}
